name: Build Android Dev
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21' # Gradle 9.0 требует Java 21

      - name: 🛠 Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: bun install

      - name: 🔑 Restore Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > ./release.jks

      - name: 🚀 Build Development APK
        run: |
          # Устанавливаем eas-cli локально для надежности и запускаем сборку
          bun install -g eas-cli
          eas build --platform android --local --profile development --non-interactive --clear-cache
        env:
          EAS_BUILD_ANDROID_KEYSTORE_PATH: "./release.jks"
          EAS_BUILD_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          EAS_BUILD_ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          EAS_BUILD_ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          JAVA_HOME: /usr/lib/jvm/temurin-21-jdk-amd64

      - name: 📁 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dev-build-apk
          path: ./*.apk
