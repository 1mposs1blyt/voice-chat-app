name: Build Android (Manual)
on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Выберите профиль сборки'
        required: true
        default: 'development'
        type: choice
        options:
          - development
          - preview
          - production

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17' # Самая стабильная для RN 0.76

      - name: 🛠 Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: bun install

      - name: 🔑 Restore Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > ./release.jks

      - name: 🚀 Build Android      - name: 🚀 Build Android
        run: |
          bun install -g eas-cli
          # Убираем --debug из команды и добавляем флаг логирования для Gradle
          eas build --platform android --local --profile ${{ github.event.inputs.profile }} --non-interactive --clear-cache
        env:
          NODE_ENV: ${{ github.event.inputs.profile }}
          EAS_BUILD_ANDROID_KEYSTORE_PATH: "./release.jks"
          EAS_BUILD_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          EAS_BUILD_ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          EAS_BUILD_ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          GRADLE_OPTS: "-Dorg.gradle.console=plain"
      - name: 📁 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.profile }}-apk
          path: ./*.apk
