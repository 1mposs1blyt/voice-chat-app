name: Build Mobile (Manual)
on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Профиль сборки'
        required: true
        default: 'development'
        type: choice
        options: [development, preview, production]
      platform:
        description: 'Платформа'
        required: true
        default: 'android'
        type: choice
        options: [android, ios]
      package_manager:
        description: 'Пакетный менеджер'
        required: true
        default: 'npm'
        type: choice
        options: [npm, bun]

jobs:
  build:
    # Для iOS локальной сборки нужен macos-latest, для Android достаточно ubuntu
    runs-on: ${{ github.event.inputs.platform == 'ios' && 'macos-latest' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: ${{ github.event.inputs.package_manager == 'npm' && 'npm' || '' }}

      - name: 🚀 Setup Bun
        if: ${{ github.event.inputs.package_manager == 'bun' }}
        uses: oven-sh/setup-bun@v1

      - name: ☕ Setup Java
        if: ${{ github.event.inputs.platform == 'android' }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🏗 Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: |
          if [ "${{ github.event.inputs.package_manager }}" = "bun" ]; then
            bun install
          else
            npm install
          fi

      - name: 🛠 Fix Native Modules (Android)
        if: ${{ github.event.inputs.platform == 'android' }}
        run: |
          find node_modules -name "build.gradle" -exec sed -i '/assertMinimalReactNativeVersionTask/d' {} + || true

      - name: 🔑 Decode Keystore (Android)
        if: ${{ github.event.inputs.platform == 'android' }}
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > ./release.jks

      - name: 🚀 Build with EAS
        run: |
          # Установка EAS зависит от менеджера
          if [ "${{ github.event.inputs.package_manager }}" = "bun" ]; then
            bun install -g eas-cli
          else
            npm install -g eas-cli
          fi
          
          # Локальная сборка
          eas build --platform ${{ github.event.inputs.platform }} --local --profile ${{ github.event.inputs.profile }} --non-interactive --clear-cache
        env:
          NODE_ENV: ${{ github.event.inputs.profile }}
          EAS_BUILD_ANDROID_KEYSTORE_PATH: "./release.jks"
          EAS_BUILD_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          EAS_BUILD_ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          EAS_BUILD_ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.console=plain -Pkotlin.plugin.suppressKotlinVersionCompatibilityCheck=true"

      - name: 📁 Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.platform }}-${{ github.event.inputs.profile }}-build
          path: |
            **/*.apk
            **/*.aab
            **/*.ipa
            **/*.app
          if-no-files-found: error
