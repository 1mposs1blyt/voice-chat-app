name: Build Android (Manual)
on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Профиль'
        required: true
        default: 'development'
        type: choice
        options: [development, preview, production]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install
        run: bun install

      - name: 🛠 Fix Worklets & Kotlin
        run: |
          find node_modules/react-native-worklets* -name "build.gradle" -exec sed -i '/assertMinimalReactNativeVersionTask/d' {} + || true
          echo "Fixes applied"

      - name: 🔑 Key
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > ./release.jks

      - name: 🚀 Build
        run: |
          bun install -g eas-cli
          eas build --platform android --local --profile ${{ github.event.inputs.profile }} --non-interactive --clear-cache
        env:
          NODE_ENV: ${{ github.event.inputs.profile }}
          EAS_BUILD_ANDROID_KEYSTORE_PATH: "./release.jks"
          EAS_BUILD_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          EAS_BUILD_ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          EAS_BUILD_ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          # Магия против ошибки компилятора Kotlin:
          GRADLE_OPTS: "-Dorg.gradle.console=plain -Pkotlin.plugin.suppressKotlinVersionCompatibilityCheck=true"

      - name: 📁 Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.profile }}-apk
          path: ./*.apk
